# Dev overrides — local env vars, AI profile
services:

  inventory-service:
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:-}
    ports:
      - "5001:5005"

  harvest-service:
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:-}
    ports:
      - "5002:5005"

  lineage-service:
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:-}
    ports:
      - "5003:5005"

  search-service:
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:-}
    ports:
      - "5004:5005"

  identity-service:
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:-}
    ports:
      - "5006:5005"

  # AI service (optional — start with: docker compose --profile ai up)
  ai-service:
    profiles: [ai]
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: ai-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-ai:5432/ai
      SPRING_DATASOURCE_USERNAME: ai
      SPRING_DATASOURCE_PASSWORD: ${AI_DB_PASSWORD:-ai}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_AI_OLLAMA_BASE_URL: ${SPRING_AI_OLLAMA_BASE_URL:-http://localhost:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3:latest}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      APP_DEV_AUTH_ENABLED: "true"
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:-}
    ports:
      - "8005:8005"
      - "5005:5005"
    depends_on:
      postgres-ai:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [catalog-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai.rule=Host(`api.catalog.local`) && PathPrefix(`/ai`)"
      - "traefik.http.services.ai.loadbalancer.server.port=8005"

