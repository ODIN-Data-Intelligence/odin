spring:
  application:
    name: search-service

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: search-consumer-catalog
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.odin.catalog.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.LinkedHashMap

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://keycloak:8180/realms/datacatalog/protocol/openid-connect/certs}

opensearch:
  uris: ${OPENSEARCH_URIS:http://localhost:9200}

server:
  port: 8004

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.odin.catalog: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
