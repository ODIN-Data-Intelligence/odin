server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so upstream hostnames are resolved at request time
    # (allows optional services like ai-service to be absent at startup)
    resolver 127.0.0.11 valid=30s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    add_header X-Frame-Options        "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options "nosniff"                           always;
    add_header X-XSS-Protection       "1; mode=block"                     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;
    # Uncomment when serving over HTTPS:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    proxy_set_header Host          $host;
    proxy_set_header X-Real-IP     $remote_addr;
    proxy_set_header Authorization $http_authorization;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Search service
    location /api/v1/search {
        set $upstream_search search-service:8004;
        proxy_pass http://$upstream_search;
    }

    # Lineage service — OpenLineage ingestion + run queries
    location /api/v1/lineage {
        set $upstream_lineage lineage-service:8003;
        proxy_pass http://$upstream_lineage;
    }

    # Lineage service — DDL submit
    location /api/v1/ddl/ {
        set $upstream_lineage lineage-service:8003;
        proxy_pass http://$upstream_lineage;
    }

    # Lineage service — dataset lineage/impact (UUID-based: /datasets/{uuid}/lineage)
    location ~ ^/api/v1/datasets/[^/]+/(lineage|impact|column-lineage) {
        set $upstream_lineage lineage-service:8003;
        proxy_pass http://$upstream_lineage;
    }

    # Lineage service — dataset lookup by namespace+name
    location /api/v1/datasets/lookup {
        set $upstream_lineage lineage-service:8003;
        proxy_pass http://$upstream_lineage;
    }

    # Lineage service — catalog-link PUT (ns/name path: /datasets/{ns}/{name}/catalog-link)
    location ~ ^/api/v1/datasets/[^/]+/[^/]+/catalog-link {
        set $upstream_lineage lineage-service:8003;
        proxy_pass http://$upstream_lineage;
    }

    # Lineage service — catalog-datasets lookup
    location /api/v1/catalog-datasets/ {
        set $upstream_lineage lineage-service:8003;
        proxy_pass http://$upstream_lineage;
    }

    # Harvest service
    location /api/v1/sources {
        set $upstream_harvest harvest-service:8002;
        proxy_pass http://$upstream_harvest;
    }
    location /api/v1/jobs {
        set $upstream_harvest harvest-service:8002;
        proxy_pass http://$upstream_harvest;
    }
    location /api/v1/runs {
        set $upstream_harvest harvest-service:8002;
        proxy_pass http://$upstream_harvest;
    }

    # Identity service
    location /api/v1/users {
        set $upstream_identity identity-service:8006;
        proxy_pass http://$upstream_identity;
    }
    location /api/v1/domains {
        set $upstream_identity identity-service:8006;
        proxy_pass http://$upstream_identity;
    }

    # AI service
    location /api/v1/conversations {
        set $upstream_ai ai-service:8005;
        proxy_pass http://$upstream_ai;
    }
    location /api/v1/semantic-search {
        set $upstream_ai ai-service:8005;
        proxy_pass http://$upstream_ai;
    }

    # Everything else → catalog service (inventory-service is the compose container name)
    location /api/ {
        set $upstream_catalog inventory-service:8001;
        proxy_pass http://$upstream_catalog;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
