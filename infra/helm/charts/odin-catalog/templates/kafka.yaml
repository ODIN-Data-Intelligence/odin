apiVersion: v1
kind: Service
metadata:
  name: {{ include "odin-catalog.fullname" . }}-kafka
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "kafka" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
  selector:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "odin-catalog.fullname" . }}-kafka
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "kafka" "root" .) | nindent 4 }}
spec:
  serviceName: {{ include "odin-catalog.fullname" . }}-kafka
  replicas: {{ .Values.kafka.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: kafka
    spec:
      containers:
        - name: kafka
          image: {{ .Values.kafka.image }}
          ports:
            - containerPort: 9092
              name: kafka
            - containerPort: 9093
              name: controller
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://{{ include "odin-catalog.fullname" . }}-kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@{{ include "odin-catalog.fullname" . }}-kafka-0.{{ include "odin-catalog.fullname" . }}-kafka:9093"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "false"
            - name: KAFKA_HEAP_OPTS
              value: {{ .Values.kafka.heapOpts | quote }}
            - name: CLUSTER_ID
              value: {{ .Values.kafka.clusterId | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          resources: {{- toYaml .Values.resources.kafka | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.kafka.storage }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "odin-catalog.fullname" . }}-kafka-init
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "kafka-init" "root" .) | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until nc -z {{ include "odin-catalog.fullname" . }}-kafka 9092; do
                echo "Waiting for Kafka..."
                sleep 5
              done
              echo "Kafka is ready."
      containers:
        - name: kafka-init
          image: {{ .Values.kafka.image }}
          command: ["/bin/bash", "/scripts/create-topics.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: {{ include "odin-catalog.fullname" . }}-kafka-scripts
            defaultMode: 0755
