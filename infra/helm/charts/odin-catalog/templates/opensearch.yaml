apiVersion: v1
kind: Service
metadata:
  name: {{ include "odin-catalog.fullname" . }}-opensearch
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "opensearch" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
  selector:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "odin-catalog.fullname" . }}-opensearch
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "opensearch" "root" .) | nindent 4 }}
spec:
  serviceName: {{ include "odin-catalog.fullname" . }}-opensearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: opensearch
    spec:
      initContainers:
        - name: sysctl
          image: busybox:1.36
          securityContext:
            privileged: true
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
      containers:
        - name: opensearch
          image: {{ .Values.opensearch.image }}
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          env:
            - name: cluster.name
              value: odin-catalog
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: discovery.type
              value: single-node
            - name: DISABLE_SECURITY_PLUGIN
              value: {{ .Values.opensearch.disableSecurity | quote }}
            - name: OPENSEARCH_JAVA_OPTS
              value: {{ .Values.opensearch.javaOpts | quote }}
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
          resources: {{- toYaml .Values.resources.opensearch | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.opensearch.storage }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "odin-catalog.fullname" . }}-opensearch-init
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "opensearch-init" "root" .) | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: opensearch-init
          image: curlimages/curl:8.7.1
          command: ["/bin/sh", "/config/init-index.sh"]
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: {{ include "odin-catalog.fullname" . }}-opensearch-init
            defaultMode: 0755
