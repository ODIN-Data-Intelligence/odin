{{- $root := . -}}

{{/* ── frontend-producer (management app) ─────────────────────────────────── */}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "odin-catalog.fullname" $root }}-frontend-producer
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "frontend-producer" "root" $root) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $root.Values.services.frontendProducer.port }}
      targetPort: 8080
  selector:
    app.kubernetes.io/name: frontend-producer
    app.kubernetes.io/instance: {{ $root.Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "odin-catalog.fullname" $root }}-frontend-producer
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "frontend-producer" "root" $root) | nindent 4 }}
spec:
  replicas: {{ $root.Values.services.frontendProducer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend-producer
      app.kubernetes.io/instance: {{ $root.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend-producer
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        app.kubernetes.io/component: frontend-producer
    spec:
      containers:
        - name: frontend-producer
          image: {{ $root.Values.images.frontendProducer.repository }}:{{ $root.Values.images.frontendProducer.tag }}
          imagePullPolicy: {{ $root.Values.images.frontendProducer.pullPolicy }}
          env:
            - name: KEYCLOAK_URL
              value: {{ printf "http://%s" $root.Values.ingress.keycloakHost | quote }}
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources: {{- toYaml $root.Values.resources.frontend | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "odin-catalog.fullname" $root }}-frontend-producer-nginx

{{/* ── frontend-consumer (discovery app) ──────────────────────────────────── */}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "odin-catalog.fullname" $root }}-frontend-consumer
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "frontend-consumer" "root" $root) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $root.Values.services.frontendConsumer.port }}
      targetPort: 8080
  selector:
    app.kubernetes.io/name: frontend-consumer
    app.kubernetes.io/instance: {{ $root.Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "odin-catalog.fullname" $root }}-frontend-consumer
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "frontend-consumer" "root" $root) | nindent 4 }}
spec:
  replicas: {{ $root.Values.services.frontendConsumer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend-consumer
      app.kubernetes.io/instance: {{ $root.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend-consumer
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        app.kubernetes.io/component: frontend-consumer
    spec:
      containers:
        - name: frontend-consumer
          image: {{ $root.Values.images.frontendConsumer.repository }}:{{ $root.Values.images.frontendConsumer.tag }}
          imagePullPolicy: {{ $root.Values.images.frontendConsumer.pullPolicy }}
          env:
            - name: CONSUMER_API_KEY
              value: {{ $root.Values.app.consumerApiKey | quote }}
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf.tmpl
              subPath: default.conf.tmpl
          resources: {{- toYaml $root.Values.resources.frontend | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "odin-catalog.fullname" $root }}-frontend-consumer-nginx
