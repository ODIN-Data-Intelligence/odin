{{- if .Values.ingress.enabled }}
{{- $root := . -}}

{{/* ── Consumer frontend ──────────────────────────────────────────────────── */}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "odin-catalog.fullname" . }}-consumer
  labels: {{- include "odin-catalog.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.consumerHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "odin-catalog.fullname" . }}-frontend-consumer
                port:
                  number: {{ .Values.services.frontendConsumer.port }}
  {{- with .Values.ingress.tls }}
  tls: {{- toYaml . | nindent 4 }}
  {{- end }}

{{/* ── Producer frontend ──────────────────────────────────────────────────── */}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "odin-catalog.fullname" . }}-producer
  labels: {{- include "odin-catalog.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.producerHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "odin-catalog.fullname" . }}-frontend-producer
                port:
                  number: {{ .Values.services.frontendProducer.port }}
  {{- with .Values.ingress.tls }}
  tls: {{- toYaml . | nindent 4 }}
  {{- end }}

{{/* ── Keycloak ─────────────────────────────────────────────────────────── */}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "odin-catalog.fullname" . }}-keycloak
  labels: {{- include "odin-catalog.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_busy_buffers_size 256k;
      proxy_buffers           4 256k;
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.keycloakHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "odin-catalog.fullname" . }}-keycloak
                port:
                  number: 8180
  {{- with .Values.ingress.tls }}
  tls: {{- toYaml . | nindent 4 }}
  {{- end }}

{{/* ── API gateway — one ingress per service, strips path prefix ─────────── */}}
{{- $apiServices := list
  (dict "path" "inventory" "svc" "inventory-service" "port" .Values.services.inventoryService.port)
  (dict "path" "harvest"   "svc" "harvest-service"   "port" .Values.services.harvestService.port)
  (dict "path" "lineage"   "svc" "lineage-service"   "port" .Values.services.lineageService.port)
  (dict "path" "search"    "svc" "search-service"    "port" .Values.services.searchService.port)
  (dict "path" "ai"        "svc" "ai-service"        "port" .Values.services.aiService.port)
  (dict "path" "identity"  "svc" "identity-service"  "port" .Values.services.identityService.port)
  (dict "path" "policy"    "svc" "policy-service"    "port" .Values.services.policyService.port)
}}
{{- range $apiServices }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "odin-catalog.fullname" $root }}-api-{{ .path }}
  labels: {{- include "odin-catalog.labels" $root | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: {{ printf "%s-strip-%s@kubernetescrd" $root.Release.Namespace .path | quote }}
spec:
  ingressClassName: {{ $root.Values.ingress.className }}
  rules:
    - host: {{ $root.Values.ingress.apiHost }}
      http:
        paths:
          - path: /{{ .path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "odin-catalog.fullname" $root }}-{{ .svc }}
                port:
                  number: {{ .port }}
  {{- with $root.Values.ingress.tls }}
  tls: {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
