apiVersion: v1
kind: Service
metadata:
  name: {{ include "odin-catalog.fullname" . }}-redis
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "redis" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "odin-catalog.fullname" . }}-redis
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "redis" "root" .) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: data
              mountPath: /data
          resources: {{- toYaml .Values.resources.redis | nindent 12 }}
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "odin-catalog.fullname" . }}-redis-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "odin-catalog.fullname" . }}-redis-data
  labels: {{- include "odin-catalog.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.redis.storage }}
