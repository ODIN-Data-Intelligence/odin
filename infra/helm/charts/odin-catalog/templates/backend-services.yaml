{{- $root := . -}}

{{/* ── inventory-service ─────────────────────────────────────────────────── */}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "odin-catalog.fullname" $root }}-inventory-service
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "inventory-service" "root" $root) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $root.Values.services.inventoryService.port }}
      targetPort: {{ $root.Values.services.inventoryService.port }}
  selector:
    app.kubernetes.io/name: inventory-service
    app.kubernetes.io/instance: {{ $root.Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "odin-catalog.fullname" $root }}-inventory-service
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "inventory-service" "root" $root) | nindent 4 }}
spec:
  replicas: {{ $root.Values.services.inventoryService.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-service
      app.kubernetes.io/instance: {{ $root.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory-service
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        app.kubernetes.io/component: inventory-service
    spec:
      serviceAccountName: {{ include "odin-catalog.serviceAccountName" $root }}
      containers:
        - name: inventory-service
          image: {{ $root.Values.images.inventoryService.repository }}:{{ $root.Values.images.inventoryService.tag }}
          imagePullPolicy: {{ $root.Values.images.inventoryService.pullPolicy }}
          ports:
            - containerPort: {{ $root.Values.services.inventoryService.port }}
          envFrom:
            - configMapRef:
                name: {{ include "odin-catalog.fullname" $root }}-common
          env:
            - name: SERVER_PORT
              value: {{ $root.Values.services.inventoryService.port | quote }}
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ include "odin-catalog.fullname" $root }}-postgres-inventory:5432/inventory"
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ $root.Values.postgres.inventory.username | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "odin-catalog.fullname" $root }}-postgres
                  key: inventory-password
          resources: {{- toYaml $root.Values.resources.backend | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ $root.Values.services.inventoryService.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ $root.Values.services.inventoryService.port }}
            initialDelaySeconds: 60
            periodSeconds: 20

