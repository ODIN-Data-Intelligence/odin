            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "odin-catalog.fullname" $root }}-minio
                  key: root-password
            - name: SPRING_QUARTZ_DATASOURCE_URL
              value: "jdbc:postgresql://{{ include "odin-catalog.fullname" $root }}-postgres-harvest:5432/harvest"
            - name: SPRING_REDIS_HOST
              value: "{{ include "odin-catalog.fullname" $root }}-redis"
          resources: {{- toYaml $root.Values.resources.backend | nindent 12 }}
          readinessProbe:
