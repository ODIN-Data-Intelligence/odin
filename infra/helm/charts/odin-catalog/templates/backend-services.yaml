            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ $root.Values.services.harvestService.port }}
            initialDelaySeconds: 60
            periodSeconds: 20

