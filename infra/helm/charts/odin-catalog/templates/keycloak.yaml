apiVersion: v1
kind: Service
metadata:
  name: {{ include "odin-catalog.fullname" . }}-keycloak
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "keycloak" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8180
      targetPort: 8180
  selector:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "odin-catalog.fullname" . }}-keycloak
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "keycloak" "root" .) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: keycloak
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image }}
          args:
            - start-dev
            - --import-realm
            - --http-port=8180
          ports:
            - containerPort: 8180
              name: http
          env:
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.adminUser | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "odin-catalog.fullname" . }}-keycloak
                  key: admin-password
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: {{ printf "jdbc:postgresql://%s-postgres-identity:5432/keycloak" (include "odin-catalog.fullname" .) | quote }}
            - name: KC_DB_USERNAME
              value: {{ .Values.postgres.identity.username | quote }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "odin-catalog.fullname" . }}-postgres
                  key: identity-password
            - name: KC_HTTP_PORT
              value: "8180"
            - name: KC_HOSTNAME
              value: {{ .Values.ingress.keycloakHost | quote }}
            - name: KC_HOSTNAME_STRICT
              value: "false"
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
          resources: {{- toYaml .Values.resources.keycloak | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8180
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
      volumes:
        - name: realm
          configMap:
            name: {{ include "odin-catalog.fullname" . }}-keycloak-realm
