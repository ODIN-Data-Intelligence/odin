apiVersion: v1
kind: Service
metadata:
  name: {{ include "odin-catalog.fullname" . }}-minio
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "minio" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  selector:
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "odin-catalog.fullname" . }}-minio
  labels: {{- include "odin-catalog.componentLabels" (dict "component" "minio" "root" .) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: minio
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image }}
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "odin-catalog.fullname" . }}-minio
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "odin-catalog.fullname" . }}-minio
                  key: root-password
          volumeMounts:
            - name: data
              mountPath: /data
          resources: {{- toYaml .Values.resources.minio | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "odin-catalog.fullname" . }}-minio-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "odin-catalog.fullname" . }}-minio-data
  labels: {{- include "odin-catalog.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.minio.storage }}
