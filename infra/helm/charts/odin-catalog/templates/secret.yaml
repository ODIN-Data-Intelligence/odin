apiVersion: v1
kind: Secret
metadata:
  name: {{ include "odin-catalog.fullname" . }}-postgres
  labels: {{- include "odin-catalog.labels" . | nindent 4 }}
type: Opaque
stringData:
  inventory-password: {{ .Values.postgres.inventory.password | quote }}
  harvest-password:   {{ .Values.postgres.harvest.password | quote }}
  lineage-password:   {{ .Values.postgres.lineage.password | quote }}
  identity-password:  {{ .Values.postgres.identity.password | quote }}
  ai-password:        {{ .Values.postgres.ai.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "odin-catalog.fullname" . }}-minio
  labels: {{- include "odin-catalog.labels" . | nindent 4 }}
type: Opaque
stringData:
  root-user:     {{ .Values.minio.rootUser | quote }}
  root-password: {{ .Values.minio.rootPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "odin-catalog.fullname" . }}-keycloak
  labels: {{- include "odin-catalog.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-password: {{ .Values.keycloak.adminPassword | quote }}
  client-secret:  {{ .Values.keycloak.clientSecret | quote }}
