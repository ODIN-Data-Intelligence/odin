---
# ── lineage (Apache AGE) ─────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: odin-catalog-postgres-lineage
  namespace: odin-catalog
  labels:
    app.kubernetes.io/name: postgres-lineage
    app.kubernetes.io/component: postgres-lineage
    app.kubernetes.io/part-of: odin-catalog
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: postgres-lineage
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: odin-catalog-postgres-lineage
  namespace: odin-catalog
  labels:
    app.kubernetes.io/name: postgres-lineage
    app.kubernetes.io/component: postgres-lineage
    app.kubernetes.io/part-of: odin-catalog
spec:
  serviceName: odin-catalog-postgres-lineage
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-lineage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-lineage
        app.kubernetes.io/component: postgres-lineage
        app.kubernetes.io/part-of: odin-catalog
    spec:
      containers:
        - name: postgres
          image: apache/age:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: lineage
            - name: POSTGRES_USER
              value: lineage
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odin-catalog-postgres
                  key: lineage-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d/lineage-init.sql
              subPath: lineage-init.sql
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "lineage", "-d", "lineage"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "lineage", "-d", "lineage"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: init-scripts
          configMap:
            name: odin-catalog-postgres-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

