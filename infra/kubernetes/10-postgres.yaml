# Five PostgreSQL StatefulSets — one per service.
# lineage uses apache/age (PostgreSQL + AGE graph extension).
# ai uses pgvector/pgvector.
# All others use postgres:16-alpine.

---
# ── inventory ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: odin-catalog-postgres-inventory
  namespace: odin-catalog
  labels:
    app.kubernetes.io/name: postgres-inventory
    app.kubernetes.io/component: postgres-inventory
    app.kubernetes.io/part-of: odin-catalog
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: postgres-inventory
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: odin-catalog-postgres-inventory
  namespace: odin-catalog
  labels:
    app.kubernetes.io/name: postgres-inventory
    app.kubernetes.io/component: postgres-inventory
    app.kubernetes.io/part-of: odin-catalog
spec:
  serviceName: odin-catalog-postgres-inventory
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-inventory
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-inventory
        app.kubernetes.io/component: postgres-inventory
        app.kubernetes.io/part-of: odin-catalog
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: inventory
            - name: POSTGRES_USER
              value: inventory
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odin-catalog-postgres
                  key: inventory-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "inventory", "-d", "inventory"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "inventory", "-d", "inventory"]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

