---
apiVersion: v1
kind: Service
metadata:
  name: odin-catalog-keycloak
  namespace: odin-catalog
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: keycloak
    app.kubernetes.io/part-of: odin-catalog
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8180
      targetPort: 8180
  selector:
    app.kubernetes.io/name: keycloak
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odin-catalog-keycloak
  namespace: odin-catalog
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: keycloak
    app.kubernetes.io/part-of: odin-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: keycloak
        app.kubernetes.io/part-of: odin-catalog
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          args:
            - start-dev
            - --import-realm
            - --http-port=8180
          ports:
            - containerPort: 8180
              name: http
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odin-catalog-keycloak
                  key: admin-password
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://odin-catalog-postgres-identity:5432/keycloak"
            - name: KC_DB_USERNAME
              value: identity
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odin-catalog-postgres
                  key: identity-password
            - name: KC_HTTP_PORT
              value: "8180"
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8180
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
      volumes:
        - name: realm
          configMap:
            name: odin-catalog-keycloak-realm
