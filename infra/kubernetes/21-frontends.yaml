---
# ── frontend-producer (management app, port 3000) ─────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: odin-catalog-frontend-producer
  namespace: odin-catalog
  labels:
    app.kubernetes.io/name: frontend-producer
    app.kubernetes.io/component: frontend-producer
    app.kubernetes.io/part-of: odin-catalog
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 80
  selector:
    app.kubernetes.io/name: frontend-producer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odin-catalog-frontend-producer
  namespace: odin-catalog
  labels:
    app.kubernetes.io/name: frontend-producer
    app.kubernetes.io/component: frontend-producer
    app.kubernetes.io/part-of: odin-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend-producer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend-producer
        app.kubernetes.io/component: frontend-producer
        app.kubernetes.io/part-of: odin-catalog
    spec:
      containers:
        - name: frontend-producer
          image: ${IMAGE_REGISTRY}odin/frontend-producer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
# ── frontend-consumer (discovery app, port 3001) ──────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: odin-catalog-frontend-consumer
  namespace: odin-catalog
  labels:
    app.kubernetes.io/name: frontend-consumer
    app.kubernetes.io/component: frontend-consumer
    app.kubernetes.io/part-of: odin-catalog
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3001
      targetPort: 80
  selector:
    app.kubernetes.io/name: frontend-consumer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odin-catalog-frontend-consumer
  namespace: odin-catalog
  labels:
    app.kubernetes.io/name: frontend-consumer
    app.kubernetes.io/component: frontend-consumer
    app.kubernetes.io/part-of: odin-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend-consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend-consumer
        app.kubernetes.io/component: frontend-consumer
        app.kubernetes.io/part-of: odin-catalog
    spec:
      containers:
        - name: frontend-consumer
          image: ${IMAGE_REGISTRY}odin/frontend-consumer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
