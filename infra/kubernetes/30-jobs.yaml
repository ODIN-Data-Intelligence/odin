# One-shot Jobs that run after the core infrastructure is ready.
# Re-run after a cluster wipe: kubectl delete job -n odin-catalog --all && kubectl apply -f 30-jobs.yaml

---
# ── Kafka topic creation ───────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: odin-catalog-kafka-init
  namespace: odin-catalog
  labels:
    app.kubernetes.io/name: kafka-init
    app.kubernetes.io/component: kafka-init
    app.kubernetes.io/part-of: odin-catalog
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until nc -z odin-catalog-kafka 9092; do
                echo "Waiting for Kafka..."
                sleep 5
              done
              echo "Kafka is ready."
      containers:
        - name: kafka-init
          image: apache/kafka:3.7.0
          command: ["/bin/bash", "/scripts/create-topics.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: odin-catalog-kafka-scripts
            defaultMode: 0755

---
# ── OpenSearch index creation ─────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: odin-catalog-opensearch-init
  namespace: odin-catalog
  labels:
    app.kubernetes.io/name: opensearch-init
    app.kubernetes.io/component: opensearch-init
    app.kubernetes.io/part-of: odin-catalog
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: opensearch-init
          image: curlimages/curl:8.7.1
          command: ["/bin/sh", "/config/init-index.sh"]
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: odin-catalog-opensearch-init
            defaultMode: 0755
