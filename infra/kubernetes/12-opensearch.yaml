---
apiVersion: v1
kind: Service
metadata:
  name: odin-catalog-opensearch
  namespace: odin-catalog
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/component: opensearch
    app.kubernetes.io/part-of: odin-catalog
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
  selector:
    app.kubernetes.io/name: opensearch
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: odin-catalog-opensearch
  namespace: odin-catalog
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/component: opensearch
    app.kubernetes.io/part-of: odin-catalog
spec:
  serviceName: odin-catalog-opensearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch
        app.kubernetes.io/component: opensearch
        app.kubernetes.io/part-of: odin-catalog
    spec:
      initContainers:
        - name: sysctl
          image: busybox:1.36
          securityContext:
            privileged: true
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.13.0
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          env:
            - name: cluster.name
              value: odin-catalog
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: discovery.type
              value: single-node
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
