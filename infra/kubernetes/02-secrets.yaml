# Change all password values before deploying to any non-local environment.
---
apiVersion: v1
kind: Secret
metadata:
  name: odin-catalog-postgres
  namespace: odin-catalog
  labels:
    app.kubernetes.io/part-of: odin-catalog
type: Opaque
stringData:
  inventory-password: inventory
  harvest-password:   harvest
  lineage-password:   lineage
  identity-password:  identity
  ai-password:        ai
---
apiVersion: v1
kind: Secret
metadata:
  name: odin-catalog-minio
  namespace: odin-catalog
  labels:
    app.kubernetes.io/part-of: odin-catalog
type: Opaque
stringData:
  root-user:     minioadmin
  root-password: minioadmin
---
apiVersion: v1
kind: Secret
metadata:
  name: odin-catalog-keycloak
  namespace: odin-catalog
  labels:
    app.kubernetes.io/part-of: odin-catalog
type: Opaque
stringData:
  admin-password: admin
  client-secret:  change-me-in-production
