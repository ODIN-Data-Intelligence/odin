# Image registry prefix is injected at deploy time by deploy.sh via envsubst.
# Override with: IMAGE_REGISTRY=myregistry.example.com/ ./infra/kubernetes/deploy.sh

---
# ── inventory-service ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: odin-catalog-inventory-service
  namespace: odin-catalog
  labels:
    app.kubernetes.io/name: inventory-service
    app.kubernetes.io/component: inventory-service
    app.kubernetes.io/part-of: odin-catalog
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  selector:
    app.kubernetes.io/name: inventory-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odin-catalog-inventory-service
  namespace: odin-catalog
  labels:
    app.kubernetes.io/name: inventory-service
    app.kubernetes.io/component: inventory-service
    app.kubernetes.io/part-of: odin-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory-service
        app.kubernetes.io/component: inventory-service
        app.kubernetes.io/part-of: odin-catalog
    spec:
      serviceAccountName: odin-catalog
      containers:
        - name: inventory-service
          image: ${IMAGE_REGISTRY}odin/inventory-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: odin-catalog-common
          env:
            - name: SERVER_PORT
              value: "8001"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://odin-catalog-postgres-inventory:5432/inventory"
            - name: SPRING_DATASOURCE_USERNAME
              value: inventory
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odin-catalog-postgres
                  key: inventory-password
            - name: SPRING_DATA_REDIS_HOST
              value: odin-catalog-redis
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 20

